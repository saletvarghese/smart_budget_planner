{% extends "base.html" %}

{% block content %}

<h3 class="text-center mb-4">Budget History</h3>

<table class="table table-striped table-bordered">

<thead class="table-dark">

<tr>
<th>#</th>
<th>Date</th>
<th>Income</th>
<th>Total Expense</th>
<th>Balance</th>
<th>Action</th>
</tr>

</thead>

<tbody>

{% for row in history %}

<tr>

<td>{{ loop.index0 }}</td>
<td>{{ row.Date }}</td>
<td>{{ row.Income }}</td>
<td>{{ row.Expense }}</td>
<td>{{ row.Balance }}</td>

<td>
<a href="/delete/{{ loop.index0 }}" class="btn btn-danger btn-sm">
Delete
</a>
</td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
