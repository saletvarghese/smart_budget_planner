{% extends "base.html" %}

{% block content %}

<div class="card shadow p-4">
<h3 class="text-center mb-4">Plan Your Budget</h3>

<form method="POST" action="/result">

  <div class="mb-3">
    <label for="income" class="form-label">Income</label>
    <input type="number" class="form-control" id="income" name="income" placeholder="Enter your income" required>
  </div>

  <h5>Expenses</h5>

  <div id="expense-container">
    <div class="row mb-2 expense-row">
      <div class="col">
        <input type="text" class="form-control" name="category" placeholder="Category" required>
      </div>
      <div class="col">
        <input type="number" class="form-control" name="amount" placeholder="Amount" required>
      </div>
      <div class="col-auto">
        <button type="button" class="btn btn-danger remove-btn">Remove</button>
      </div>
    </div>
    <div class="row mb-2 expense-row">
      <div class="col">
        <input type="text" class="form-control" name="category" placeholder="Category" required>
      </div>
      <div class="col">
        <input type="number" class="form-control" name="amount" placeholder="Amount" required>
      </div>
      <div class="col-auto">
        <button type="button" class="btn btn-danger remove-btn">Remove</button>
      </div>
    </div>
    <div class="row mb-2 expense-row">
      <div class="col">
        <input type="text" class="form-control" name="category" placeholder="Category" required>
      </div>
      <div class="col">
        <input type="number" class="form-control" name="amount" placeholder="Amount" required>
      </div>
      <div class="col-auto">
        <button type="button" class="btn btn-danger remove-btn">Remove</button>
      </div>
    </div>
  </div>

  <button type="button" id="add-category" class="btn btn-secondary mt-2">Add More Category</button>

  <div class="mt-4 text-center">
    <button type="submit" class="btn btn-primary">Calculate Budget</button>
  </div>

</form>
</div>

<!-- JavaScript to dynamically add/remove category rows -->
<script>
document.getElementById('add-category').addEventListener('click', function() {
    const container = document.getElementById('expense-container');
    const row = document.createElement('div');
    row.classList.add('row', 'mb-2', 'expense-row');
    row.innerHTML = `
        <div class="col">
            <input type="text" class="form-control" name="category" placeholder="Category" required>
        </div>
        <div class="col">
            <input type="number" class="form-control" name="amount" placeholder="Amount" required>
        </div>
        <div class="col-auto">
            <button type="button" class="btn btn-danger remove-btn">Remove</button>
        </div>
    `;
    container.appendChild(row);
});

// Remove a category row
document.getElementById('expense-container').addEventListener('click', function(e) {
    if (e.target && e.target.classList.contains('remove-btn')) {
        e.target.closest('.expense-row').remove();
    }
});
</script>

{% endblock %}
